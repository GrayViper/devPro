apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: api-microservice:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: "postgres://postgres:postgres@postgres:5432/devops_db"
