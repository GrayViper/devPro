name: CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [] # In real life, it might need CI to pass first
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          cd web
          docker build -t my-devops-app:latest .
      
      # In a real environment, you would log in to ECR or Docker Hub and push
      # - name: Push to Registry
      #   run: docker push my-devops-app:latest
      
      # Following push, you would trigger K8s deployment using kubectl or Helm
      # - name: Deploy to K8s
      #   run: kubectl apply -f k8s/
